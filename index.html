<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ESP32 Remote Monitor</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #111827;
      --muted: #667085;
      --line: #d8e0ea;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --warn: #b45309;
      --bad: #b91c1c;
      --ok: #15803d;
      --blue: #2563eb;
      --shadow: 0 10px 28px rgba(15, 23, 42, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }
    button, input { font: inherit; }
    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 16px;
    }
    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--muted);
      display: inline-block;
    }
    .dot.ok { background: var(--ok); }
    .dot.bad { background: var(--bad); }
    .dot.wait { background: var(--warn); }
    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--text);
      min-height: 38px;
      padding: 0 12px;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn.primary:hover { background: var(--accent-strong); }
    .btn:hover { border-color: #9aa8b8; }
    .layout {
      display: grid;
      grid-template-columns: 1.25fr .75fr;
      gap: 12px;
      margin-top: 12px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }
    .panel-title {
      font-weight: 700;
      font-size: 15px;
    }
    .muted { color: var(--muted); font-size: 13px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
    }
    .card {
      min-height: 106px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #e4eaf2;
      background: var(--panel-soft);
    }
    .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
    }
    .value {
      font-size: 28px;
      line-height: 1.1;
      font-weight: 800;
      overflow-wrap: anywhere;
      letter-spacing: 0;
    }
    .value.small { font-size: 20px; }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }
    .settings {
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .field label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
    }
    .rgb-box {
      padding: 12px;
      display: grid;
      gap: 12px;
    }
    .swatch-row {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 12px;
      align-items: center;
    }
    .swatch {
      width: 76px;
      height: 76px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #000;
    }
    input[type="color"] {
      width: 100%;
      height: 42px;
      padding: 3px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
    }
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .preset {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }
    .preset[data-color="#000000"] { color: #fff; background: #111827; }
    .log {
      height: 180px;
      overflow: auto;
      padding: 10px 12px;
      font-family: Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #1f2937;
      background: #fbfdff;
      border-top: 1px solid var(--line);
    }
    .log div { border-bottom: 1px solid #edf2f7; padding: 4px 0; }
    @media (max-width: 880px) {
      .topbar, .layout { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .app { padding: 10px; }
      .grid, .preset-grid { grid-template-columns: 1fr; }
      .value { font-size: 24px; }
      .swatch-row { grid-template-columns: 1fr; }
      .swatch { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>ESP32 Remote Monitor</h1>
        <div class="status-row">
          <span id="connDot" class="dot bad"></span>
          <span id="connText">Disconnected</span>
          <span id="lastSeen">Last message: --</span>
        </div>
      </div>
      <div class="actions">
        <button id="connectBtn" class="btn primary" type="button">Connect</button>
        <button id="disconnectBtn" class="btn" type="button">Disconnect</button>
      </div>
    </header>

    <section class="layout">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">Telemetry</div>
          <div id="topicLabel" class="muted">home/suzhou/esp32s3-001-test/#</div>
        </div>
        <div class="grid">
          <article class="card">
            <div class="label">Indoor temperature</div>
            <div id="sensorTemp" class="value">--</div>
            <div id="sensorAge" class="meta">--</div>
          </article>
          <article class="card">
            <div class="label">Indoor humidity</div>
            <div id="sensorHum" class="value">--</div>
            <div id="sensorState" class="meta">--</div>
          </article>
          <article class="card">
            <div class="label">Weather</div>
            <div id="weatherDesc" class="value small">--</div>
            <div id="weatherMeta" class="meta">--</div>
          </article>
          <article class="card">
            <div class="label">Outdoor temperature</div>
            <div id="weatherTemp" class="value">--</div>
            <div id="weatherHum" class="meta">--</div>
          </article>
          <article class="card">
            <div class="label">Wi-Fi</div>
            <div id="wifiState" class="value small">--</div>
            <div id="wifiMeta" class="meta">--</div>
          </article>
          <article class="card">
            <div class="label">Device</div>
            <div id="deviceName" class="value small">--</div>
            <div id="deviceMeta" class="meta">--</div>
          </article>
        </div>
      </div>

      <aside class="panel">
        <div class="panel-head">
          <div class="panel-title">MQTT</div>
          <div id="mqttState" class="muted">idle</div>
        </div>
        <div class="settings">
          <div class="field">
            <label for="brokerInput">Broker</label>
            <input id="brokerInput" value="wss://broker.emqx.io:8084/mqtt">
          </div>
          <div class="field">
            <label for="baseTopicInput">Base topic</label>
            <input id="baseTopicInput" value="home/suzhou/esp32s3-001-test">
          </div>
        </div>
        <div class="panel-head">
          <div class="panel-title">RGB</div>
          <div id="rgbText" class="muted">#000000</div>
        </div>
        <div class="rgb-box">
          <div class="swatch-row">
            <div id="swatch" class="swatch"></div>
            <input id="colorInput" type="color" value="#000000">
          </div>
          <div class="preset-grid">
            <button class="preset" data-color="#ff0000" type="button">Red</button>
            <button class="preset" data-color="#00ff00" type="button">Green</button>
            <button class="preset" data-color="#0000ff" type="button">Blue</button>
            <button class="preset" data-color="#ffffff" type="button">White</button>
            <button class="preset" data-color="#ffaa3c" type="button">Warm</button>
            <button class="preset" data-color="#00ffff" type="button">Cyan</button>
            <button class="preset" data-color="#ff00ff" type="button">Pink</button>
            <button class="preset" data-color="#000000" type="button">Off</button>
          </div>
          <button id="sendColorBtn" class="btn primary" type="button">Send RGB</button>
        </div>
        <div id="log" class="log"></div>
      </aside>
    </section>
  </main>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    const els = Object.fromEntries(Array.from(document.querySelectorAll('[id]')).map(el => [el.id, el]));
    let client = null;
    let baseTopic = els.baseTopicInput.value.trim();
    let currentColor = '#000000';

    function log(line) {
      const item = document.createElement('div');
      item.textContent = new Date().toLocaleTimeString('en-US', { hour12: false }) + '  ' + line;
      els.log.prepend(item);
      while (els.log.children.length > 80) els.log.lastChild.remove();
    }

    function setConnection(state, text) {
      els.connDot.className = 'dot ' + state;
      els.connText.textContent = text;
      els.mqttState.textContent = text.toLowerCase();
    }

    function fmtAge(ms) {
      if (!Number.isFinite(ms) || ms < 0) return '--';
      if (ms < 1000) return 'just now';
      const s = Math.floor(ms / 1000);
      if (s < 60) return s + ' s ago';
      const m = Math.floor(s / 60);
      if (m < 60) return m + ' min ago';
      const h = Math.floor(m / 60);
      return h + ' h ago';
    }

    function fmtUptime(ms) {
      if (!Number.isFinite(ms)) return '--';
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return h + 'h ' + m + 'm ' + sec + 's';
    }

    function hexToRgb(hex) {
      const v = hex.replace('#', '');
      return {
        r: parseInt(v.slice(0, 2), 16),
        g: parseInt(v.slice(2, 4), 16),
        b: parseInt(v.slice(4, 6), 16)
      };
    }

    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(v => Math.max(0, Math.min(255, Number(v) || 0)).toString(16).padStart(2, '0')).join('');
    }

    function setColor(hex, fromDevice) {
      currentColor = hex.toLowerCase();
      els.colorInput.value = currentColor;
      els.swatch.style.background = currentColor;
      els.rgbText.textContent = currentColor.toUpperCase() + (fromDevice ? ' synced' : '');
    }

    function publishColor(hex) {
      if (!client || !client.connected) {
        log('RGB skipped: MQTT offline');
        return;
      }
      const rgb = hexToRgb(hex);
      const topic = baseTopic + '/cmd/rgb';
      const payload = JSON.stringify({ r: rgb.r, g: rgb.g, b: rgb.b, hex });
      client.publish(topic, payload, { qos: 1, retain: false }, err => {
        log(err ? 'RGB publish failed' : 'RGB publish ' + payload);
      });
    }

    function updateTelemetry(data) {
      els.sensorTemp.textContent = data.sensor_ok ? Number(data.sensor_temp).toFixed(1) + ' C' : '--';
      els.sensorHum.textContent = data.sensor_ok ? Number(data.sensor_humidity).toFixed(1) + ' %' : '--';
      els.sensorAge.textContent = 'sensor ' + fmtAge(Number(data.sensor_age));
      els.sensorState.textContent = data.sensor_ok ? 'sensor ok' : 'sensor waiting';

      els.weatherDesc.textContent = data.weather_desc || '--';
      els.weatherMeta.textContent = (data.city || '--') + ' / ' + (data.weather_status || '--') + ' / ' + fmtAge(Number(data.weather_age));
      els.weatherTemp.textContent = data.weather_temp ? data.weather_temp + ' C' : '--';
      els.weatherHum.textContent = data.weather_humidity ? 'humidity ' + data.weather_humidity + ' %, wind ' + (data.wind_scale || '--') : '--';

      els.wifiState.textContent = data.sta_connected ? 'connected' : 'offline';
      els.wifiMeta.textContent = (data.sta_ip || '--') + ' / ' + (Number.isFinite(data.wifi_rssi) ? data.wifi_rssi + ' dBm' : '--');
      els.deviceName.textContent = data.device || 'esp32';
      els.deviceMeta.textContent = 'uptime ' + fmtUptime(Number(data.uptime)) + ' / heap ' + Math.round((Number(data.free_heap) || 0) / 1024) + ' KB';

      if (Number.isFinite(data.rgb_r) && Number.isFinite(data.rgb_g) && Number.isFinite(data.rgb_b)) {
        setColor(rgbToHex(data.rgb_r, data.rgb_g, data.rgb_b), true);
      }
    }

    function updateRgbState(data) {
      if (Number.isFinite(data.r) && Number.isFinite(data.g) && Number.isFinite(data.b)) {
        setColor(rgbToHex(data.r, data.g, data.b), true);
      }
    }

    function handleMessage(topic, payloadBuffer) {
      const payload = payloadBuffer.toString();
      els.lastSeen.textContent = 'Last message: ' + new Date().toLocaleTimeString('en-US', { hour12: false });
      log(topic);
      let data = null;
      try { data = JSON.parse(payload); } catch (err) { return; }
      if (topic === baseTopic + '/telemetry') updateTelemetry(data);
      if (topic === baseTopic + '/state/rgb') updateRgbState(data);
      if (topic === baseTopic + '/status') {
        log(data.online ? 'device online' : 'device offline');
      }
    }

    function connect() {
      if (!window.mqtt) {
        setConnection('bad', 'MQTT.js missing');
        return;
      }
      if (client) client.end(true);
      baseTopic = els.baseTopicInput.value.trim().replace(/\/+$/, '');
      const broker = els.brokerInput.value.trim();
      els.topicLabel.textContent = baseTopic + '/#';
      setConnection('wait', 'Connecting');
      log('connect ' + broker);
      client = mqtt.connect(broker, {
        clientId: 'web_' + Math.random().toString(16).slice(2),
        clean: true,
        reconnectPeriod: 2000,
        connectTimeout: 8000,
        keepalive: 60
      });
      client.on('connect', () => {
        setConnection('ok', 'Connected');
        client.subscribe(baseTopic + '/#', { qos: 0 }, err => log(err ? 'subscribe failed' : 'subscribed ' + baseTopic + '/#'));
      });
      client.on('reconnect', () => setConnection('wait', 'Reconnecting'));
      client.on('close', () => setConnection('bad', 'Disconnected'));
      client.on('error', err => log('error ' + err.message));
      client.on('message', handleMessage);
    }

    els.connectBtn.addEventListener('click', connect);
    els.disconnectBtn.addEventListener('click', () => {
      if (client) client.end(true);
      setConnection('bad', 'Disconnected');
      log('disconnect');
    });
    els.colorInput.addEventListener('input', evt => setColor(evt.target.value, false));
    els.sendColorBtn.addEventListener('click', () => publishColor(currentColor));
    document.querySelectorAll('.preset').forEach(btn => {
      btn.addEventListener('click', () => {
        setColor(btn.dataset.color, false);
        publishColor(btn.dataset.color);
      });
    });

    setColor(currentColor, false);
    connect();
  </script>
</body>
</html>
